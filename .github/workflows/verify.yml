name: Verify

on:
  pull_request:
    branches: [main]

env:
  SCHEME: edith
  DESTINATION: platform=macOS,arch=arm64

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -scheme $SCHEME \
            -destination "$DESTINATION" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=

      - name: Test
        run: |
          xcodebuild test \
            -scheme $SCHEME \
            -destination "$DESTINATION" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=
